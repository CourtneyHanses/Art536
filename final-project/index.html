<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Project</title>

<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script> 
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js"></script>
<!--<script src="https://unpkg.com/aframe-ground-component@0.0.4/dist/aframe-ground-component.min.js"></script>  geometry="depth: 1.5; height: 2.75; width: 1.5"-->
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene >
        <a-assets>
             <a-asset-item id="rays" src="rays-03.glb"></a-asset-item>
             <a-asset-item id="words" src="words-02.glb"></a-asset-item>
             <a-asset-item id="booth" src="booth.glb"></a-asset-item>
          </a-assets>
        
        <a-sky color="#abe4f7"></a-sky>
        <a-entity environment="preset: forest; groundColor: #445;"></a-entity>
        <a-plane rotation="-90 0 0" width="30" height="30" color="#7BC8A4" material="color: #398453" class="floor"></a-plane>></a-plane>
        <a-cylinder radius="4" height=".05" color="grey" material="color: #d1d1d1" class="floor"></a-cylinder>></a-cylinder> 
        <a-box id="walkway" position="0 0 -9.36143" height="5" color="white" geometry="depth: 11.54; height: 0.05; width: 1.34" material="color: #d1d1d1" class="floor"></a-box>></a-box>
        <a-box id="stage" position="-5.85032 0.22146 0" height="5" color="white" geometry="depth: 3.71; height: 0.48; width: 2.4"></a-box>
        <a-box id="stage-step" position="-4.51849 0.10008 0" height="5" color="white" geometry="depth: 3.71; height: 0.253; width: 0.43"></a-box>

        <a-gltf-model src="booth" id="booth1" position="-2.22274 0.83898 -4.68204" color="white" scale="0.2 .2 .2" rotation="0 30 0"></a-box>
        <a-gltf-model src="booth" id="booth2" position="-4.04756 0.83898 -3.1062" color="white" scale="0.2 .2 .2" rotation="0 54 0"></a-box>
        <a-gltf-model src="booth" id="booth3" position="2.08829 0.83898 -4.68204" color="white" scale="0.2 .2 .2" rotation="0 -30 0"></a-box>
        <a-gltf-model src="booth" id="booth4" position="4.07418 0.83898 -3.1062" color="white" scale="0.2 .2 .2" rotation="0 -54 0"></a-box>
        <a-gltf-model src="booth" id="booth5" position="4.94374 0.83898 -1.1236" color="white" scale="0.2 .2 .2" rotation="0 10 0"></a-box>
        <a-gltf-model src="booth" id="booth6" position="4.94374 0.83898 1.05032" color="white" scale="0.2 .2 .2" rotation="0 -10 0"></a-box>
        <a-gltf-model src="booth" id="booth7" position="4.07418 0.83898 3.11988" color="white" scale="0.2 .2 .2" rotation="0 54 0"></a-box>
        <a-gltf-model src="booth" id="booth8" position="2.08829 0.83898 4.76144" color="white" scale="0.2 .2 .2" rotation="0 30 0"></a-box>
        <a-gltf-model src="booth" id="booth9" position="0.00133 0.83898 5.2484" color="white" scale="0.2 .2 .2" ></a-box>
        <a-gltf-model src="booth" id="booth10" position="-2.22274 0.83898 4.67448" color="white" scale="0.2 .2 .2" rotation="0 -30 0"></a-box>
        <a-gltf-model src="booth" id="booth11" position="-4.04756 0.83898 3.17206" color="white" scale="0.2 .2 .2" rotation="0 -54 0"></a-box> 

        <a-gltf-model src="#rays" position="1.74 1.4 -6.452" rotaton="0 180 0" scale="0.02 0.02 0.02"></a-gltf-model>
        <a-gltf-model src="#words" position="1.74 .9 -6.452" rotaton="0 180 0" scale="0.02 0.02 0.02"></a-gltf-model>

        <a-entity id="player" position="0 1.6 0">
            <!-- camera -->
            <a-entity id="camera" camera wasd-controls look-controls></a-entity>
            <!-- hand controls -->
            <a-entity id="left-hand" raycaster="objects: .floor" oculus-touch-controls="hand: left" blink-controls></a-entity>
            <a-entity id="right-hand" raycaster="objects: .floor" oculus-touch-controls="hand: right" blink-controls></a-entity>
        </a-entity>
    </a-scene>
</body>
</html>
