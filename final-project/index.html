<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Project</title>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene>
        <a-assets>
             <a-asset-item id="rays" src="rays-03.glb"></a-asset-item>
             <a-asset-item id="words" src="words-02.glb"></a-asset-item>
             <a-asset-item id="booth" src="booth.glb"></a-asset-item>
             <img id="stageback" src="stageback.png" alt="">
          </a-assets>
        
        <!--<a-sky color="#abe4f7"></a-sky>-->
        <a-entity environment="preset: forest; groundColor: #398453; grid: cross; groundTexture: none; skyType: atmosphere; shadow: true; flatShading: true; lightPosition: 2 3 -1; shadowSize: 20; shadowBias: 10"></a-entity>
        <!--<a-plane rotation="-90 0 0" width="30" height="30" color="#7BC8A4" material="color: #398453" class="floor"></a-plane>-->
        
        <a-entity id="main" scale="1.75 1.75 1.75" shadow>
        <a-cylinder radius="4" height=".05" color="grey" material="color: #d1d1d1" class="floor"></a-cylinder>
        <a-box id="walkway" position="0 0 -9.36143" height="5" color="white" geometry="depth: 11.54; height: 0.05; width: 1.34" material="color: #d1d1d1" class="floor"></a-box>
        <a-box id="stage" position="-5.85032 0.22146 0" height="5" color="white" geometry="depth: 3.71; height: 0.48; width: 2.4"></a-box>
        <a-box id="stage-step" position="-4.51849 0.10008 0" height="5" color="white" geometry="depth: 3.71; height: 0.253; width: 0.43"></a-box>
        <a-box id="stage-back" position="-6.95678 1.20265 0" height="5" color="white" geometry="depth: 3.71; height: 0.21; width: 2.62" rotation="0 0 90"></a-box>
        <a-plane id="stage-back-design-2" position="-6.84 1.19084 -0.0046" height="5" geometry="height: 2.4; width: 3.71" rotation="0 90 0" material="src: #stageback"></a-plane>>
        <a-box id="stage-top" position="-5.85032 2.45803 0" height="5" color="white" geometry="depth: 3.71; height: 0.15; width: 2.4"></a-box>
        <a-cylinder id="stage-support1" geometry="height: 2.25; radius: 0.07" position="-4.77243 1.31938 1.716"></a-cylinder>
        <a-cylinder id="stage-support2" geometry="height: 2.25; radius: 0.07" position="-4.77243 1.31938 -1.716"></a-cylinder>
        <a-gltf-model src="#booth" id="booth1" position="-2 0 -5" scale="35 40 35" rotation="0 30 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth2" position="-4 0 -3.569" scale="35 40 35" rotation="0 54 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth3" position="2.705 0 -4.566" scale="35 40 35" rotation="0 -30 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth4" position="4.352 0 -2.919" scale="35 40 35" rotation="0 -54 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth5" position="5.236 0 -.587" scale="35 40 35" rotation="0 -80 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth6" position="5.261 0 1.586" scale="35 40 35" rotation="0 -90 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth7" position="3.846 0 3.849" scale="35 40 35" rotation="0 -134 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth8" position="1.811 0 5.158" scale="35 40 35" rotation="0 -150 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth9" position="-.608 0 5.485" scale="35 40 35" rotation="0 180 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth10" position="-3.040 0 4.484" scale="35 40 35" rotation="0 150 0"></a-gltf-model>
        <a-gltf-model src="#booth" id="booth11" position="-4.690 0 2.728" scale="35 40 35" rotation="0 126 0"></a-gltf-model>

        <a-gltf-model src="#rays" position="1.74 1.35 -6.452" rotaton="0 180 0" scale="0.02 0.02 0.02" gltf-model="rays-03.glb" rotation="0 180 0" shadow></a-gltf-model>
        <a-gltf-model src="#words" position="1.74 0.85 -6.452" rotaton="0 180 0" scale="0.02 0.02 0.02" gltf-model="words-02.glb" rotation="0 180 0" shadow></a-gltf-model>
            </a-entity>


        <a-entity id="player" position="0 1.6 0">
            <!-- camera -->
            <a-entity id="camera" camera wasd-controls look-controls></a-entity>
            <!-- hand controls -->
            <a-entity id="left-hand" raycaster="objects: .floor" oculus-touch-controls="hand: left" blink-controls></a-entity>
            <a-entity id="right-hand" raycaster="objects: .floor" oculus-touch-controls="hand: right" blink-controls></a-entity>
        </a-entity>
    </a-scene>
</body>
</html>
